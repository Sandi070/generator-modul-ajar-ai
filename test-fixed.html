<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fixed App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Test Fixed Application</h1>
    <button onclick="runTests()">Run Tests</button>
    <div id="results"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="app-fixed.js"></script>
    
    <script>
        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `test ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }

        function runTests() {
            document.getElementById('results').innerHTML = '';
            
            // Test 1: Check if functions exist
            addResult('Testing function existence...');
            
            if (typeof generateModulAjar === 'function') {
                addResult('✅ generateModulAjar function exists');
            } else {
                addResult('❌ generateModulAjar function missing', false);
                return;
            }
            
            if (typeof collectFormData === 'function') {
                addResult('✅ collectFormData function exists');
            } else {
                addResult('❌ collectFormData function missing', false);
            }
            
            // Test 2: Check libraries
            if (typeof docx !== 'undefined') {
                addResult('✅ docx library loaded');
            } else {
                addResult('❌ docx library not loaded', false);
            }
            
            if (typeof saveAs !== 'undefined') {
                addResult('✅ FileSaver library loaded');
            } else {
                addResult('❌ FileSaver library not loaded', false);
            }
            
            // Test 3: Test generation
            try {
                const testData = {
                    namaPenyusun: 'Test User',
                    instansi: 'Test School',
                    mataPelajaran: 'Matematika',
                    faseKelas: 'E/X',
                    semester: 'Ganjil',
                    tahunPelajaran: '2025/2026',
                    materi: 'Test Materi',
                    alokasiWaktu: '3',
                    pendekatan: ['karakter'],
                    modelPembelajaran: 'PBL',
                    kompetensiAwal: '',
                    capaianPembelajaran: 'Test capaian',
                    tujuanPembelajaran: 'Test tujuan'
                };
                
                const result = generateModulAjar(testData);
                addResult('✅ Modul generation successful');
                addResult(`Generated sections: ${Object.keys(result).join(', ')}`);
                
            } catch (error) {
                addResult(`❌ Generation failed: ${error.message}`, false);
            }
        }
        
        // Auto-run tests
        setTimeout(runTests, 1000);
    </script>
</body>
</html>
