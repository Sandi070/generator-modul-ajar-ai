<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test - Generator Modul Ajar AI</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Simple Test Generator Modul Ajar AI</h1>
    
    <button onclick="runSimpleTest()">Run Simple Test</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="app.js"></script>
    
    <script>
        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        function runSimpleTest() {
            clearResults();
            addResult('Starting simple test...');

            try {
                // Test 1: Create simple form data
                const testData = {
                    namaPenyusun: 'Test User',
                    instansi: 'Test School',
                    mataPelajaran: 'Matematika',
                    faseKelas: 'E/X',
                    semester: 'Ganjil',
                    tahunPelajaran: '2025/2026',
                    materi: 'Fungsi Linear',
                    alokasiWaktu: '3',
                    pendekatan: ['karakter'],
                    modelPembelajaran: 'PBL',
                    kompetensiAwal: 'Konsep dasar aljabar',
                    capaianPembelajaran: 'Siswa mampu memahami fungsi linear',
                    tujuanPembelajaran: 'Memahami konsep fungsi linear\nMenggambar grafik fungsi linear'
                };
                addResult('✅ Test data created');

                // Test 2: Generate modul
                const modul = generateModulAjar(testData);
                addResult('✅ Modul generated successfully');

                // Test 3: Check modul structure
                const requiredSections = ['identitas', 'kompetensiAwal', 'dimensiProfil', 'langkahPembelajaran', 'asesmen'];
                requiredSections.forEach(section => {
                    if (modul[section]) {
                        addResult(`✅ Section '${section}' exists`);
                    } else {
                        addResult(`❌ Section '${section}' missing`, false);
                    }
                });

                // Test 4: Check learning steps
                if (modul.langkahPembelajaran && modul.langkahPembelajaran.kegiatan) {
                    addResult(`✅ Learning steps generated (${modul.langkahPembelajaran.kegiatan.length} phases)`);
                } else {
                    addResult('❌ Learning steps missing', false);
                }

                // Test 5: Check assessment
                if (modul.asesmen && modul.asesmen.diagnostik && modul.asesmen.sumatif) {
                    addResult('✅ Assessment sections generated');
                } else {
                    addResult('❌ Assessment sections missing', false);
                }

                addResult('🎉 All tests completed successfully!');

            } catch (error) {
                addResult(`❌ Test failed: ${error.message}`, false);
                console.error('Test error:', error);
            }
        }

        // Auto-run test on load
        window.addEventListener('load', function() {
            setTimeout(runSimpleTest, 1000);
        });
    </script>
</body>
</html>
