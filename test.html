<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Generator Modul Ajar AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #5a6fd8; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 Test Generator Modul Ajar AI</h1>
        
        <div class="test-section">
            <h2>1. Browser Compatibility Test</h2>
            <button onclick="testBrowserCompatibility()">Test Browser</button>
            <div id="browserTest"></div>
        </div>
        
        <div class="test-section">
            <h2>2. JavaScript Functions Test</h2>
            <button onclick="testJavaScriptFunctions()">Test Functions</button>
            <div id="jsTest"></div>
        </div>
        
        <div class="test-section">
            <h2>3. Form Validation Test</h2>
            <button onclick="testFormValidation()">Test Validation</button>
            <div id="formTest"></div>
        </div>
        
        <div class="test-section">
            <h2>4. AI Generation Test</h2>
            <button onclick="testAIGeneration()">Test AI</button>
            <div id="aiTest"></div>
        </div>
        
        <div class="test-section">
            <h2>5. Document Export Test</h2>
            <button onclick="testDocumentExport()">Test Export</button>
            <div id="exportTest"></div>
        </div>
        
        <div class="test-section">
            <h2>6. Performance Test</h2>
            <button onclick="testPerformance()">Test Performance</button>
            <div id="performanceTest"></div>
        </div>
    </div>

    <script>
        function addResult(containerId, message, type = 'success') {
            const container = document.getElementById(containerId);
            const result = document.createElement('div');
            result.className = `test-result ${type}`;
            result.textContent = message;
            container.appendChild(result);
        }

        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }

        function testBrowserCompatibility() {
            clearResults('browserTest');
            
            // Test browser features
            const tests = [
                {
                    name: 'ES6 Support',
                    test: () => {
                        try {
                            eval('const test = () => {}; let x = `template`; class Test {}');
                            return true;
                        } catch (e) {
                            return false;
                        }
                    }
                },
                {
                    name: 'Local Storage',
                    test: () => typeof(Storage) !== "undefined"
                },
                {
                    name: 'Fetch API',
                    test: () => typeof(fetch) !== "undefined"
                },
                {
                    name: 'CSS Grid',
                    test: () => CSS.supports('display', 'grid')
                },
                {
                    name: 'CSS Flexbox',
                    test: () => CSS.supports('display', 'flex')
                }
            ];

            tests.forEach(test => {
                const result = test.test();
                addResult('browserTest', 
                    `${test.name}: ${result ? 'PASS' : 'FAIL'}`, 
                    result ? 'success' : 'error'
                );
            });
        }

        function testJavaScriptFunctions() {
            clearResults('jsTest');
            
            // Test core functions exist
            const functions = [
                'collectFormData',
                'generateModulAjar', 
                'generateKompetensiAwal',
                'generateLangkahPembelajaran',
                'generateAsesmen',
                'displayResult'
            ];

            // Since we can't load the main app.js here, we'll simulate
            functions.forEach(func => {
                addResult('jsTest', 
                    `Function ${func}: SIMULATED PASS`, 
                    'warning'
                );
            });
            
            addResult('jsTest', 'Note: Load main application to test actual functions', 'warning');
        }

        function testFormValidation() {
            clearResults('formTest');
            
            // Test form validation logic
            const testData = {
                valid: {
                    namaPenyusun: 'Test User',
                    instansi: 'Test School',
                    mataPelajaran: 'Matematika',
                    materi: 'Test Topic'
                },
                invalid: {
                    namaPenyusun: '',
                    instansi: '',
                    mataPelajaran: '',
                    materi: ''
                }
            };

            // Simulate validation
            const validateData = (data) => {
                return Object.values(data).every(value => value.trim() !== '');
            };

            addResult('formTest', 
                `Valid data test: ${validateData(testData.valid) ? 'PASS' : 'FAIL'}`,
                validateData(testData.valid) ? 'success' : 'error'
            );

            addResult('formTest', 
                `Invalid data test: ${!validateData(testData.invalid) ? 'PASS' : 'FAIL'}`,
                !validateData(testData.invalid) ? 'success' : 'error'
            );
        }

        function testAIGeneration() {
            clearResults('aiTest');
            
            // Simulate AI generation test
            const testSubjects = ['Matematika', 'Kimia', 'Al-Quran Hadits', 'Bahasa Arab'];
            
            testSubjects.forEach(subject => {
                // Simulate generation time
                setTimeout(() => {
                    addResult('aiTest', 
                        `AI Generation for ${subject}: SIMULATED SUCCESS`,
                        'success'
                    );
                }, Math.random() * 1000);
            });

            addResult('aiTest', 'Testing AI generation for multiple subjects...', 'warning');
        }

        function testDocumentExport() {
            clearResults('exportTest');
            
            // Test if required libraries are available
            const libraries = [
                { name: 'docx.js', check: () => typeof docx !== 'undefined' },
                { name: 'FileSaver.js', check: () => typeof saveAs !== 'undefined' }
            ];

            libraries.forEach(lib => {
                try {
                    const available = lib.check();
                    addResult('exportTest', 
                        `${lib.name}: ${available ? 'LOADED' : 'NOT LOADED'}`,
                        available ? 'success' : 'error'
                    );
                } catch (e) {
                    addResult('exportTest', 
                        `${lib.name}: ERROR - ${e.message}`,
                        'error'
                    );
                }
            });
        }

        function testPerformance() {
            clearResults('performanceTest');
            
            // Test performance metrics
            const startTime = performance.now();
            
            // Simulate heavy computation
            let result = 0;
            for (let i = 0; i < 1000000; i++) {
                result += Math.random();
            }
            
            const endTime = performance.now();
            const duration = endTime - startTime;
            
            addResult('performanceTest', 
                `Computation test: ${duration.toFixed(2)}ms`,
                duration < 100 ? 'success' : duration < 500 ? 'warning' : 'error'
            );

            // Test memory usage (approximate)
            if (performance.memory) {
                const memory = performance.memory;
                addResult('performanceTest', 
                    `Memory used: ${(memory.usedJSHeapSize / 1024 / 1024).toFixed(2)} MB`,
                    'success'
                );
            } else {
                addResult('performanceTest', 
                    'Memory info not available in this browser',
                    'warning'
                );
            }
        }

        // Auto-run basic tests on load
        window.onload = function() {
            setTimeout(() => {
                testBrowserCompatibility();
            }, 500);
        };
    </script>
</body>
</html>
